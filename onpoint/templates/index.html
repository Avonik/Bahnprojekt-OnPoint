<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Journey Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@2.51.5/dist/full.css" rel="stylesheet">
    <link href="/static/aos/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto mt-10" data-aos="fade-in">
        <div class="card bg-white shadow-xl p-6">
            <h1 class="text-2xl font-bold text-center">Train Journey Planner</h1>
            <form id="journeyForm" class="space-y-4 mt-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Starting Location</span>
                    </label>
                    <input type="text" id="startingLocation" class="input input-bordered" placeholder="Enter starting location" required>
                </div>
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">End Location</span>
                    </label>
                    <input type="text" id="endLocation" class="input input-bordered" placeholder="Enter end location" required>
                </div>
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Departure Time</span>
                    </label>
                    <input type="datetime-local" id="departureTime" class="input input-bordered" required>
                </div>
                <div class="form-control mt-4">
                    <button type="submit" class="btn btn-primary w-full">Find Journeys</button>
                </div>
            </form>
        </div>

        <div id="journeyResults" class="mt-10 hidden" data-aos="fade-up">
            <h2 class="text-xl font-bold">Journey Results</h2>
            <div id="resultsContainer" class="space-y-4 mt-4"></div>
        </div>
    </div>
    <script src="/static/aos/aos.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
